    <script>
      function updateThemeColor() {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        const themeColor = getComputedStyle(document.documentElement)
          .getPropertyValue(isDark ? '--theme-color-dark' : '--theme-color-light')
          .trim();

        const meta = document.querySelector('#theme-color-meta');
        if (meta) {
          meta.setAttribute('content', themeColor || '#7803db');
        }
      }

      // Run on load
      updateThemeColor();

      // Listen for OS theme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateThemeColor);

      // Optional: If your site has a theme toggle button
      document.addEventListener('themechange', updateThemeColor);

      // Optional: If CSS variables change dynamically
      const observer = new MutationObserver(updateThemeColor);
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['style'] });
    </script>
